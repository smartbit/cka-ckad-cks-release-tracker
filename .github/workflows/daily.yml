name: Daily update

on:
  schedule:
    - cron: '0 7 * * *'  # daily 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  # ARCHIVE_PAT secret provides administration:write for making repo private after 30 days of failure

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install PyMuPDF
        run: pip install --quiet PyMuPDF

      - name: Run tracker
        id: run
        run: |
          python3 cka-ckad-cks-release-tracker.py > tables.md 2>errors.log
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit 0  # don't fail the step; we handle exit codes below

      - name: Update README
        if: steps.run.outputs.rc == '0' || steps.run.outputs.rc == '1'
        id: update
        run: |
          # Preserve footer (badges etc.) from existing README
          footer=""
          if [ -f README.md ] && grep -q '<!-- footer -->' README.md; then
            footer=$(sed -n '/<!-- footer -->/,$p' README.md)
          fi
          # Build new README: generated tables + preserved footer
          if [ -n "$footer" ]; then
            { cat tables.md; echo "$footer"; } > README.new
          else
            cat tables.md > README.new
          fi
          if [ -f README.md ] && diff -q README.md README.new > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            mv README.new README.md
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md tracker.json
          git commit -m "Update cert tracker $(date -I)"
          git push

      - name: Close issue on success
        if: steps.run.outputs.rc == '0'
        run: |
          issue=$(gh issue list --label tracker-failure --state open --json number --jq '.[0].number // empty')
          if [ -n "$issue" ]; then
            gh issue close "$issue" --comment "Auto-resolved: tracker ran successfully on $(date -I)"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Handle failure
        if: steps.run.outputs.rc == '2'
        run: |
          errors=$(cat errors.log)

          # Check for existing open issue
          existing=$(gh issue list --label tracker-failure --state open --json number,createdAt --jq '.[0] // empty')

          if [ -z "$existing" ]; then
            gh issue create \
              --title "Tracker failure: $(date -I)" \
              --label tracker-failure \
              --body "$(cat <<EOF
          ## Tracker failed

          Exit code: ${{ steps.run.outputs.rc }}

          ### Errors
          \`\`\`
          $errors
          \`\`\`

          ### Next steps
          - Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - See [RECOVERY.md](RECOVERY.md) for recovery procedures

          If this issue remains open for 30+ days, the repo will be made private.
          EOF
          )"
          else
            issue_num=$(echo "$existing" | jq -r '.number')
            created=$(echo "$existing" | jq -r '.createdAt')

            gh issue comment "$issue_num" \
              --body "Still failing as of $(date -I). [Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

            # Archive if failure persists 30+ days
            created_epoch=$(date -d "$created" +%s)
            now_epoch=$(date +%s)
            days=$(( (now_epoch - created_epoch) / 86400 ))
            if [ "$days" -ge 30 ]; then
              gh issue comment "$issue_num" \
                --body "Failure persisted for ${days} days. Making repository private. See RECOVERY.md to restore."
              GH_TOKEN="${{ secrets.ARCHIVE_PAT }}" \
                gh repo edit --visibility private --accept-visibility-change-consequences
            fi
          fi
        env:
          GH_TOKEN: ${{ github.token }}
